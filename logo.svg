<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="thread1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="thread2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="thread3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="thread4" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>

  <!-- Weaving threads forming an interconnected "T" / knot -->
  <!-- Thread 1: sweeps from top-left down and across -->
  <path d="M60 80 C60 80, 120 160, 180 200 C220 220, 260 200, 320 180 C340 170, 350 160, 350 150"
        stroke="url(#thread1)" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Thread 2: sweeps from top-right down and across, weaving under -->
  <path d="M340 80 C340 80, 280 160, 220 200 C180 220, 140 200, 80 180 C60 170, 50 160, 50 150"
        stroke="url(#thread2)" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Thread 3: horizontal weave through the middle -->
  <path d="M60 250 C110 230, 170 215, 230 220 C290 225, 330 240, 340 250"
        stroke="url(#thread3)" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Thread 4: vertical rise from bottom, weaving through -->
  <path d="M200 340 C200 300, 195 260, 200 200 C205 140, 200 170, 200 60"
        stroke="url(#thread4)" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Accent nodes at intersection points -->
  <circle cx="200" cy="200" r="10" fill="#0EA5E9" opacity="0.9"/>
  <circle cx="200" cy="200" r="5" fill="white" opacity="0.9"/>

  <circle cx="120" cy="175" r="5" fill="#1E3A5F" opacity="0.8"/>
  <circle cx="280" cy="175" r="5" fill="#06B6D4" opacity="0.8"/>
  <circle cx="200" cy="280" r="5" fill="#0EA5E9" opacity="0.8"/>
  <circle cx="200" cy="110" r="5" fill="#1E3A5F" opacity="0.8"/>
</svg>